<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mural de Recados — Entrar</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <!-- ══ LOGIN CARD ══════════════════════════════════════════ -->
  <div class="auth-card" id="loginCard">
    <div class="auth-logo">
      <span class="logo-icon">📌</span>
      <h1>Mural de Recados</h1>
      <p>Entre para ver seus recados</p>
    </div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="username">Usuário</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Seu nome de usuário"
          autocomplete="username"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <p id="loginError" class="alert alert-error hidden"></p>

      <button type="submit" class="btn-primary" data-label="Entrar">Entrar</button>
    </form>

    <p class="auth-switch">
      Ainda não tem conta?
      <a href="#" id="showRegister">Cadastre-se</a>
    </p>
  </div>

  <!-- ══ REGISTER CARD ═══════════════════════════════════════ -->
  <div class="auth-card hidden" id="registerCard">
    <div class="auth-logo">
      <span class="logo-icon">📌</span>
      <h1>Criar Conta</h1>
      <p>Junte-se ao Mural de Recados</p>
    </div>

    <form id="registerForm" novalidate>
      <div class="form-group">
        <label for="reg_username">Usuário</label>
        <input
          type="text"
          id="reg_username"
          name="reg_username"
          placeholder="Escolha um nome de usuário"
          autocomplete="username"
          required
        />
      </div>

      <div class="form-group">
        <label for="reg_password">Senha</label>
        <input
          type="password"
          id="reg_password"
          name="reg_password"
          placeholder="Mínimo 6 caracteres"
          autocomplete="new-password"
          required
        />
      </div>

      <div class="form-group">
        <label for="data_nasc">Data de Nascimento</label>
        <input
          type="date"
          id="data_nasc"
          name="data_nasc"
          required
        />
      </div>

      <div class="form-group">
        <label for="curso_id">Curso</label>
        <select id="curso_id" name="curso_id" required>
          <option value="" disabled selected>Selecione seu curso...</option>
          <option value="1">Engenharia de Software</option>
          <option value="2">Ciência da Computação</option>
          <option value="3">Sistemas de Informação</option>
        </select>
      </div>

      <p id="registerError" class="alert alert-error hidden"></p>

      <button type="submit" class="btn-primary" data-label="Criar Conta">Criar Conta</button>
    </form>

    <p class="auth-switch">
      Já tem uma conta?
      <a href="#" id="showLogin">Entrar</a>
    </p>
  </div>

  <!-- scripts -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
